<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Async Weather Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #161E54, #2a3570);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1300px;
            margin: auto;
        }

        .parent-card {
            display: flex;
            gap: 20px;
        }

        h1 {
            text-align: center;
            color: #BBE0EF;
            margin-bottom: 20px;
        }

        .card {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            width: 100%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 6px;
            border: 2px solid #BBE0EF;
            outline: none;
        }

        button {
            padding: 10px 20px;
            background: #F16D34;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #d65a28;
        }

        .weather-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            border-left: 4px solid #F16D34;
            margin-bottom: 8px;
            background: #f9f9f9;
            border-radius: 0 4px 4px 0;
        }

        .weather-item label {
            font-weight: bold;
            color: #161E54;
        }

        .history {
            margin-top: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .history button {
            background: #00b7ff;
            color: #000000;
            font-size: 0.85rem;
            padding: 6px 14px;
            border-radius: 20px;
        }

        .clear-btn {
            background: transparent;
            color: #ff6b6b;
            border: 1px solid #ff6b6b;
            margin-top: 15px;
            font-size: 0.8rem;
        }

        .clear-btn:hover {
            background: #ff6b6b;
            color: white;
        }

        @media (max-width:700px) {
            .parent-card {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <div class="container">

        <h1>🌤 Async Weather Tracker</h1>

        <div class="parent-card">
            <div class="card">
                <h3>Search City</h3>
                <div class="input-group">
                    <input id="cityInput" placeholder="Delhi, London, Tokyo...">
                    <button id="searchBtn">Search</button>
                </div>
                
                <div id="history-section">
                    <br>
                    <br>
                    <h3>Search History</h3>
                    <div class="history" id="history"></div>
                    <button id="clearHistory" class="clear-btn">Clear History</button>
                </div>
            </div>

            <div class="card">
                <h3>Weather Info</h3>
                <div id="weather">
                    <p style="color: #666; text-align: center; margin-top: 20px;">Search for a city to see weather data.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "ce7db121d803f255267934e9868f1d45";
        const weatherBox = document.getElementById("weather");
        const historyBox = document.getElementById("history");
        const cityInput = document.getElementById("cityInput");

        async function getWeather(city) {
            const res = await fetch(
                `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`
            );
            if (!res.ok) {
                throw new Error("City not found");
            }
            return await res.json();
        }

        document.getElementById("searchBtn").onclick = () => {
            handleSearch();
        };

        function renderWeather(d) {
            weatherBox.innerHTML = `
                <div class="weather-item"><label>City</label><span>${d.name}, ${d.sys.country}</span></div>
                <div class="weather-item"><label>Temperature</label><span>${d.main.temp} °C</span></div>
                <div class="weather-item"><label>Weather</label><span>${d.weather[0].main}</span></div>
                <div class="weather-item"><label>Humidity</label><span>${d.main.humidity}%</span></div>
                <div class="weather-item"><label>Wind Speed</label><span>${d.wind.speed} m/s</span></div>
            `;
        }

        function saveHistory(city) {
            let history = JSON.parse(localStorage.getItem("weatherHistory")) || [];
            
            history = history.filter(item => item.toLowerCase() !== city.toLowerCase());
            history.unshift(city);

            if (history.length > 6) history.pop();

            localStorage.setItem("weatherHistory", JSON.stringify(history));
            showHistory();
        }

        function showHistory() {
            const history = JSON.parse(localStorage.getItem("weatherHistory")) || [];
            if (history.length === 0) {
                historyBox.innerHTML = "<p style='font-size:0.8rem; color:#999'>No recent searches.</p>";
                return;
            }
            
            historyBox.innerHTML = history.map(city => 
                `<button onclick="triggerHistorySearch('${city}')">${city}</button>`
            ).join("");
        }

        function triggerHistorySearch(city) {
            cityInput.value = city;
            search(city);
        }

        async function search(city) {
            weatherBox.innerHTML = "<p>Loading...</p>";
            try {
                const data = await getWeather(city);
                renderWeather(data);
                saveHistory(data.name); 
            } catch (error) {
                weatherBox.innerHTML = `<p style="color:red; padding: 10px; border: 1px solid red; border-radius: 4px;">Error: ${error.message}</p>`;
            }
        }

        function handleSearch() {
            const city = cityInput.value.trim();
            if (city) {
                search(city);
            }
        }
       
        cityInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                handleSearch();
            }
        });

        document.getElementById("clearHistory").onclick = () => {
            localStorage.removeItem("weatherHistory");
            showHistory();
        };

        showHistory();
    </script>
</body>

</html>
